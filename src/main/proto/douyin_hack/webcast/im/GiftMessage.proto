syntax = "proto3";

option java_multiple_files = true;
option java_package = "cool.scx.live_room_watcher.impl.douyin_hack.proto.webcast.im";

package webcast.im;

import "douyin_hack/webcast/data/User.proto";
import "douyin_hack/webcast/data/GiftStruct.proto";
import "douyin_hack/webcast/im/Common.proto";

// 更新时间 : 2026-06-29
message GiftMessage {
    webcast.im.Common common = 1;
    int64 gift_id = 2;
    int64 fan_ticket_count = 3;
    int64 group_count = 4;
    int64 repeat_count = 5;
    int64 combo_count = 6;
    webcast.data.User user = 7;
    webcast.data.User to_user = 8;
    int32 repeat_end = 9;
    int64 group_id = 11;
    webcast.data.GiftStruct gift = 15;
    string log_id = 16;
    int64 send_type = 17;
    int64 total_count = 29;
    int64 send_time = 33;
    string trace_id = 35;
    int64 count = 44;
}
