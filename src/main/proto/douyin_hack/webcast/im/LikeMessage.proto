syntax = "proto3";

option java_multiple_files = true;
option java_package = "cool.scx.live_room_watcher.impl.douyin_hack.proto.webcast.im";

package webcast.im;

import "douyin_hack/webcast/im/Common.proto";
import "douyin_hack/webcast/data/User.proto";

// 更新时间 : 2026-06-23
message LikeMessage {
    webcast.im.Common common = 1;
    int64 count = 2;
    int64 total = 3;
    int64 color = 4;
    webcast.data.User user = 5;
    string icon = 6;
    bytes double_like_detail = 7;
    bytes display_control_info = 8;
    int64 linkmic_guest_uid = 9;
    string scene = 10;
    bytes pico_display_info = 11;
    bytes public_area_common = 12;
}
